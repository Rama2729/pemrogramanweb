<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>EduPrompt AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
       
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        h1, h2, h3 {
            text-align: center;
        }

        h1 {
            color: #c20000;
            font-size: 48px; 
            font-weight: 700;
        }

        h2 {
            color: #333; 
            font-size: 2.5rem;
            font-weight: 400;
        }

        h3 {
            color: #e74c3c;
            font-style: italic;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        img {
            display: block;
            margin: 20px auto;
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Pemrograman Web</h1>
        <h2>Tio Chaerul Ramadhan</h2>
        <h3>SI RAGAZZI FORZA FERRARI!</h3>
        
        <img src="foto/charles leclerc monza 2024.jpeg" alt="Ferrari Team Image">
    </div>

</body>
</html>
